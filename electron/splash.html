<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>School Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 520px; height: 300px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: transparent;
  }
  .card {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #071a3d 0%, #0d2a63 55%, #1e3a8a 100%);
    border-radius: 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    padding: 32px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-opacity='0.04' stroke-width='1'%3E%3Crect x='0' y='0' width='60' height='60'/%3E%3C/g%3E%3C/svg%3E");
  }
  .logo-wrap {
    display: flex; align-items: center; gap: 14px; position: relative;
  }
  .logo-mark {
    width: 52px; height: 52px; border-radius: 16px;
    background: linear-gradient(135deg, #38bdf8, #2563eb 60%, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 30px rgba(37,99,235,.5);
  }
  .logo-mark img { width: 34px; height: 34px; object-fit: contain; }
  .logo-copy strong { color: #fff; font-size: 22px; font-weight: 900; display: block; }
  .logo-copy span { color: #93c5fd; font-size: 13px; font-weight: 600; }
  .status {
    color: #bfdbfe; font-size: 13px; font-weight: 600;
    min-height: 18px; text-align: center; position: relative;
    white-space: pre-line; line-height: 1.5;
  }
  .bar-wrap {
    width: 300px; height: 4px; background: rgba(255,255,255,.12);
    border-radius: 99px; overflow: hidden; position: relative;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #2563eb, #7c3aed);
    border-radius: 99px;
    animation: slide 1.6s ease-in-out infinite;
    background-size: 200% 100%;
  }
  @keyframes slide {
    0%   { background-position: 200% 0; width: 40%; transform: translateX(-100%); }
    50%  { background-position: 0% 0;   width: 60%; }
    100% { background-position: -200% 0;width: 40%; transform: translateX(360px); }
  }
  .version { color: rgba(255,255,255,.3); font-size: 11px; position: absolute; bottom: 14px; right: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark">
      <img src="../public/app-logo.png" alt="" onerror="this.style.display='none'" />
    </div>
    <div class="logo-copy">
      <strong>School Manager</strong>
      <span>Smart Academic ERP &mdash; Desktop</span>
    </div>
  </div>
  <div class="bar-wrap"><div class="bar-fill"></div></div>
  <div class="status" id="status">Initialising…</div>
  <div class="version" id="ver"></div>
</div>
<script>
  const { ipcRenderer } = require('electron');
  ipcRenderer.on('splash:status', (_, msg) => {
    document.getElementById('status').textContent = msg;
  });
  ipcRenderer.on('splash:version', (_, v) => {
    document.getElementById('ver').textContent = 'v' + v;
  });
</script>
</body>
</html>
